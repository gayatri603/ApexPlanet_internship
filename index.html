<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h2>MyPortfolio</h2>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <ul id="navLinks">
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#todo">To-Do</a></li>
    <li><a href="#products">Products</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <button onclick="toggleTheme()">🌙</button>
</nav>


<section class="hero" id="about">
  <h1>Creative Developer</h1>
  <p>Building modern interactive web apps</p>
</section>

<section id="projects" class="fade">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">Portfolio Website</div>
    <div class="card">To-Do App</div>
    <div class="card">Product Filter App</div>
  </div>
</section>


<section id="todo" class="fade">
  <h2>To-Do List</h2>
  <input type="text" id="task" placeholder="Add task">
  <button onclick="addTask()">Add</button>
  <ul id="list"></ul>
</section>


<section id="products" class="fade">
  <h2>Products</h2>

  <input type="text" id="search" placeholder="Search..." onkeyup="filterProducts()">

  <select onchange="sortProducts(this.value)">
    <option value="default">Sort</option>
    <option value="low">Price Low → High</option>
    <option value="high">Price High → Low</option>
  </select>

  <div id="productList"></div>
</section>

<section id="contact" class="fade">
  <h2>Contact</h2>
  <form onsubmit="return validateForm()">
    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <textarea id="message" placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
