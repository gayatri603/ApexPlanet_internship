<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartShop - Responsive E-commerce</title>
<style>

* {margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif;}
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  background:#1e272e;
  color:white;
  padding:15px;
}
.navbar h2 {font-size:1.5rem;}
.navbar input {padding:8px; border-radius:5px; border:none; flex:1; min-width:150px; margin:5px;}
.navbar .cart {cursor:pointer; font-weight:bold; margin-left:10px;}

.hero {
  background: linear-gradient(135deg,#ff6a00,#ee0979);
  color:white;
  text-align:center;
  padding:60px 20px;
}
.hero h1 {font-size:2.5rem; margin-bottom:10px;}
.hero p {font-size:1.2rem;}

.categories {text-align:center; margin:20px;}
.categories button {
  margin:5px; padding:8px 15px;
  border:none; border-radius:5px;
  background:#3498db; color:white; cursor:pointer; transition:0.2s;
}
.categories button:hover {background:#2980b9;}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
  padding:20px;
}
.card {
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  transition:0.3s;
  position:relative;
}
.card:hover {transform:translateY(-5px);}
.card img {width:100%; height:200px; object-fit:cover;}
.badge {
  position:absolute;
  top:10px; left:10px;
  background:red; color:white;
  padding:5px 10px;
  border-radius:5px; font-size:0.8rem; font-weight:bold;
}
.card-content {padding:15px;}
.card-content h3 {margin-bottom:5px; font-size:1.1rem;}
.price {color:green; font-weight:bold; margin-right:10px;}
.old {text-decoration:line-through; color:gray; font-size:0.9rem;}
.rating {color:gold; font-size:0.9rem; margin-bottom:5px;}
.card-content button {
  width:100%; padding:10px; background:#e67e22;
  color:white; border:none; border-radius:5px;
  cursor:pointer; transition:0.2s;
}
.card-content button:hover {background:#d35400;}
.cart-sidebar {
  position:fixed;
  right:-350px; top:0;
  width:350px; height:100%;
  background:white;
  padding:20px;
  box-shadow:-5px 0 15px rgba(0,0,0,0.2);
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}
.cart-sidebar.active {right:0;}
.cart-item {
  display:flex; justify-content:space-between; align-items:center;
  margin:10px 0;
}
.cart-item button {
  background:red; color:white; border:none;
  padding:3px 6px; border-radius:4px; cursor:pointer;
}
.quantity {display:flex; align-items:center; gap:5px;}
.quantity button {
  width:25px; height:25px; border-radius:50%;
  background:#3498db; color:white; border:none;
  cursor:pointer; display:flex; justify-content:center; align-items:center;
}
@media(max-width:600px){
  .navbar {flex-direction:column; gap:10px;}
  .cart-sidebar {width:100%;}
}
</style>
</head>
<body>
<div class="navbar">
  <h2>🛍 SmartShop</h2>
  <input type="text" id="search" placeholder="Search products...">
  <div class="cart" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</div>
<div class="hero">
  <h1>🔥 Mega Sale!</h1>
  <p>Get the best products with huge discounts!</p>
</div>
<div class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('electronics')">Electronics</button>
  <button onclick="filterCategory('fashion')">Fashion</button>
  <button onclick="filterCategory('accessories')">Accessories</button>
</div>
<div class="products" id="products"></div>
<div class="cart-sidebar" id="cartSidebar">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ₹<span id="total">0</span></h3>
</div>

<script>
const products = [
  {id:1,name:"Smartphone X",price:15999,old:19999,cat:"electronics",rating:5,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",badge:"New"},
  {id:2,name:"Wireless Headphones",price:2999,old:3999,cat:"electronics",rating:4,img:"https://images.unsplash.com/photo-1518443895914-6c2e33d5c1f3",badge:"Sale"},
  {id:3,name:"Running Shoes",price:3499,old:4999,cat:"fashion",rating:4,img:"https://images.unsplash.com/photo-1528701800489-20be3c63e33d",badge:"New"},
  {id:4,name:"Smart Watch",price:4999,old:5999,cat:"electronics",rating:5,img:"https://images.unsplash.com/photo-1519741497674-611481863552",badge:"Sale"},
  {id:5,name:"Leather Bag",price:2500,old:3500,cat:"fashion",rating:4,img:"https://images.unsplash.com/photo-1593032465170-3f4b6442f1e0",badge:"New"},
  {id:6,name:"Sunglasses",price:1200,old:1999,cat:"accessories",rating:5,img:"https://images.unsplash.com/photo-1556228724-4d59f8c50b19",badge:"Sale"},
  {id:7,name:"Laptop Pro",price:59999,old:69999,cat:"electronics",rating:5,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8",badge:"New"},
  {id:8,name:"Sports Jacket",price:4500,old:5500,cat:"fashion",rating:4,img:"https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f",badge:"Sale"},
  {id:9,name:"Backpack",price:1800,old:2500,cat:"accessories",rating:4,img:"https://images.unsplash.com/photo-1503387762-592deb58ef4e",badge:"New"},
  {id:10,name:"Camera DSLR",price:32000,old:39999,cat:"electronics",rating:5,img:"https://images.unsplash.com/photo-1519183071298-a2962f88e10e",badge:"Sale"}
];

let cart = [];
function showProducts(items){
  const container = document.getElementById("products");
  container.innerHTML = "";
  items.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        ${p.badge?`<div class="badge">${p.badge}</div>`:""}
        <img src="${p.img}" alt="${p.name}">
        <div class="card-content">
          <h3>${p.name}</h3>
          <div class="rating">${"⭐".repeat(p.rating)}</div>
          <p><span class="price">₹${p.price}</span> <span class="old">₹${p.old}</span></p>
          <button onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      </div>`;
  });
}
function addToCart(id){
  const product = products.find(p=>p.id===id);
  const exist = cart.find(p=>p.id===id);
  if(exist) exist.qty++;
  else cart.push({...product, qty:1});
  updateCart();
}
function updateCart(){
  const cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML="";
  let total=0,count=0;
  cart.forEach(item=>{
    total += item.price*item.qty;
    count += item.qty;
    cartDiv.innerHTML += `
      <div class="cart-item">
        <span>${item.name}</span>
        <div class="quantity">
          <button onclick="changeQty(${item.id},-1)">-</button>
          ${item.qty}
          <button onclick="changeQty(${item.id},1)">+</button>
        </div>
        <button onclick="removeFromCart(${item.id})">❌</button>
      </div>`;
  });
  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = count;
}
function changeQty(id,change){
  const item = cart.find(p=>p.id===id);
  item.qty += change;
  if(item.qty<1) removeFromCart(id);
  updateCart();
}
function removeFromCart(id){
  cart = cart.filter(p=>p.id!==id);
  updateCart();
}
function toggleCart(){
  document.getElementById("cartSidebar").classList.toggle("active");
}
document.getElementById("search").addEventListener("input",e=>{
  const q = e.target.value.toLowerCase();
  showProducts(products.filter(p=>p.name.toLowerCase().includes(q)));
});
function filterCategory(cat){
  if(cat==="all") showProducts(products);
  else showProducts(products.filter(p=>p.cat===cat));
}
showProducts(products);
updateCart();
</script>

</body>
</html>
